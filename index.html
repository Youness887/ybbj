<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مونة البيت</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #f9f9f9; text-align: center; }
    h1 { color: #4CAF50; }
    input, button { padding: 10px; margin: 5px; }
    ul { list-style: none; padding: 0; }
    li { background: #fff; margin: 5px; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>📦 قائمة المونة</h1>
  <input type="text" id="itemInput" placeholder="أضف عنصر جديد">
  <button onclick="addItem()">➕ إضافة</button>
  <ul id="itemList"></ul>

  <script>
    function addItem() {
      const input = document.getElementById("itemInput");
      const item = input.value.trim();
      if(item !== "") {
        const li = document.createElement("li");
        li.textContent = item;
        li.onclick = () => li.remove(); // اضغط على العنصر لحذفه
        document.getElementById("itemList").appendChild(li);
        input.value = "";
      }
    }
  </script>
</body>
</html>
