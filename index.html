<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Engine Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #fff; margin: 0; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 13px; line-height: 1.6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 glass-panel flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-sm font-black uppercase italic tracking-tighter">Nexus Engine</h1>
                <div id="connection-dot" class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                    <span class="text-[8px] text-slate-400 font-bold uppercase">غير متصل</span>
                </div>
            </div>
        </div>
        <button onclick="openSettings()" class="p-2.5 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">
            <i data-lucide="key-round" class="w-5 h-5 text-indigo-400"></i>
        </button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 pb-28 no-scrollbar"></main>

    <div class="fixed bottom-0 left-0 right-0 p-4 glass-panel border-t border-white/5">
        <form onsubmit="handleChat(event)" class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="user-in" placeholder="اسأل أي شيء..." 
                   class="flex-1 bg-slate-900 border border-white/10 rounded-2xl py-3.5 px-5 text-sm outline-none focus:border-indigo-500 text-white transition-all">
            <button type="submit" class="p-3.5 bg-indigo-600 rounded-2xl text-white shadow-xl active:scale-90 transition-transform">
                <i data-lucide="send-horizonal" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <!-- Enhanced Settings -->
    <div id="settings-ui" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-white italic">إعدادات الاتصال</h2>
                <button onclick="closeSettings()"><i data-lucide="x" class="w-6 h-6 text-slate-500"></i></button>
            </div>
            <div class="space-y-5">
                <div class="p-4 bg-indigo-600/10 rounded-2xl border border-indigo-500/20">
                    <p class="text-[10px] text-indigo-300 leading-relaxed text-center font-medium">
                        إذا لم يكن لديك مفتاح، يمكنك الحصول عليه مجاناً بالضغط بالأسفل
                    </p>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" 
                       class="block mt-2 text-center text-xs font-black text-indigo-400 underline uppercase">فتح Google AI Studio</a>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold mb-2 block px-1">API Key (Gemini)</label>
                    <input type="password" id="key-input" placeholder="AIzaSy..." 
                           class="w-full bg-black border border-white/10 rounded-2xl py-4 px-6 text-xs text-white text-left outline-none focus:border-indigo-500">
                </div>
                <button onclick="saveAndTest()" class="w-full bg-indigo-600 py-4 rounded-2xl text-xs font-black text-white uppercase tracking-widest shadow-lg shadow-indigo-600/30 active:scale-95 transition-all">
                    تنشيط المفتاح الآن
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); lucide.createIcons();

        let api_key = localStorage.getItem('nexus_master_key') || '';
        if(api_key) updateStatus(true);

        function openSettings() { document.getElementById('settings-ui').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-ui').classList.add('hidden'); }

        function updateStatus(ok) {
            const dot = document.getElementById('connection-dot');
            dot.innerHTML = ok ? 
                `<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span><span class="text-[8px] text-green-400 font-bold uppercase">متصل وجاهز</span>` :
                `<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span><span class="text-[8px] text-red-400 font-bold uppercase">خطأ في المفتاح</span>`;
        }

        function saveAndTest() {
            const val = document.getElementById('key-input').value.trim();
            if (val) {
                api_key = val;
                localStorage.setItem('nexus_master_key', api_key);
                updateStatus(true);
                closeSettings();
                addMessage('bot', '✅ تم تحديث المفتاح. سأحاول الآن الاتصال بخوادم جوجل باستخدام 3 مسارات مختلفة.');
            }
        }

        async function tryRoutes(prompt) {
            // المسارات الممكنة للاتصال
            const routes = [
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${api_key}`,
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${api_key}`,
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${api_key}`
            ];

            for (let url of routes) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    if (data.error) console.error("Route failed:", url, data.error.message);
                } catch (e) {
                    console.error("Network error on route:", url);
                }
            }
            throw new Error("جميع محاولات الاتصال فشلت. يرجى التأكد من أن المفتاح مفعل وأن دولتك مدعومة.");
        }

        async function handleChat(e) {
            e.preventDefault();
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if (!val) return;
            if (!api_key) { openSettings(); return; }

            addMessage('user', val);
            input.value = '';
            const loadId = addMessage('bot', 'جاري المزامنة مع خوادم Nexus...');

            try {
                const response = await tryRoutes(val);
                updateMessage(loadId, response);
                updateStatus(true);
            } catch (err) {
                updateMessage(loadId, `❌ لم أتمكن من الاتصال. السبب المحتمل: ${err.message}`);
                updateStatus(false);
            }
        }

        function addMessage(role, content) {
            const id = Date.now();
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `
                <div id="m-${id}" class="msg-bubble shadow-xl ${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-900 border border-white/5 text-slate-100 rounded-tl-none'}">
                    ${content}
                </div>
            `;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateMessage(id, content) {
            const el = document.getElementById(`m-${id}`);
            if (el) el.innerHTML = content.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
