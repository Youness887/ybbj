<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منصة Tech بالعربي</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      direction: rtl;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #121212;
      color: #e0e0e0;
    }
    header {
      background: #0078d7;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #005a9e;
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    nav a:hover {
      text-decoration: underline;
    }
    section {
      padding: 20px;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: background 0.3s, color 0.3s;
    }
    body.dark .card {
      background: #1e1e1e;
      color: #e0e0e0;
      border-color: #333;
    }
    h2 {
      color: #333;
    }
    body.dark h2 {
      color: #e0e0e0;
    }
    iframe {
      width: 100%;
      height: 315px;
      margin-top: 10px;
      border: none;
    }
    footer {
      background: #0078d7;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
    .links {
      margin-top: 15px;
    }
    .links a {
      display: inline-block;
      margin: 5px;
      padding: 10px 15px;
      background: #0078d7;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .links a:hover {
      background: #005a9e;
    }
    #darkModeBtn {
      margin-top: 10px;
      padding: 8px 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #darkModeBtn:hover {
      background: #555;
    }
    #lessonContent {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 5px;
    }
    body.dark #lessonContent {
      background: #1e1e1e;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <!-- رأس الموقع -->
  <header>
    <h1>منصة Tech بالعربي</h1>
    <p>تعليم البرمجة + أخبار التكنولوجيا + فيديوهات</p>
    <button id="darkModeBtn">تفعيل الوضع الليلي</button>
  </header>

  <!-- قائمة التنقل -->
  <nav>
    <a href="#education">التعليم</a>
    <a href="#news">الأخبار</a>
    <a href="#videos">المرئيات</a>
    <a href="#contact">اتصل بنا</a>
  </nav>

  <!-- قسم التعليم -->
  <section id="education">
    <h2>دروس تعليمية</h2>
    <div id="lessons"></div>
    <div id="lessonContent">اختر درسًا لعرض محتواه هنا.</div>
  </section>

  <!-- قسم الأخبار -->
  <section id="news">
    <h2>آخر الأخبار التقنية</h2>
    <div id="newsList">جاري تحميل الأخبار...</div>
  </section>

  <!-- قسم الفيديوهات -->
  <section id="videos">
    <h2>فيديوهات حديثة</h2>
    <iframe src="https://www.youtube.com/embed/videoseries?list=PLoROMvodv4rO8k6jv8bqfQz6jQ0v7kG2z" allowfullscreen></iframe>
    
    <div class="links">
      <a href="https://www.youtube.com/@TEDTechnology" target="_blank">قناة TED Technology</a>
      <a href="https://www.youtube.com/@AIExplained" target="_blank">قناة AI Explained</a>
    </div>
  </section>

  <!-- قسم التواصل -->
  <section id="contact">
    <h2>اتصل بنا</h2>
    <p>البريد الإلكتروني: <span id="email"></span></p>
  </section>

  <!-- تذييل -->
  <footer>
    <p>&copy; 2026 Tech بالعربي</p>
  </footer>

  <script>
    // بيانات JSON للتعليم والتواصل
    const siteData = {
      "lessons": [
        { 
          "title": "مقدمة في HTML", 
          "description": "تعلم أساسيات بناء صفحات الويب.", 
          "content": "<p>HTML هي لغة بناء صفحات الويب. تبدأ بوسوم مثل <code>&lt;html&gt;</code> و <code>&lt;body&gt;</code>. مثال: <br><code>&lt;h1&gt;مرحبا بالعالم&lt;/h1&gt;</code></p>"
        },
        { 
          "title": "CSS للمبتدئين", 
          "description": "كيفية تنسيق الصفحات وإضافة الألوان.", 
          "content": "<p>CSS تضيف الألوان والخطوط. مثال: <br><code>body { background: lightblue; }</code></p>"
        },
        { 
          "title": "JavaScript عملي", 
          "description": "إضافة التفاعل إلى موقعك.", 
          "content": "<p>JavaScript يجعل الموقع تفاعلي. مثال: <br><code>alert('مرحبا!');</code></p>"
        }
      ],
      "contact": {
        "email": "info@tech-arabic.com"
      }
    };

    // عرض الدروس كبطاقات
    const lessonsContainer = document.getElementById('lessons');
    siteData.lessons.forEach(lesson => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${lesson.title}</h3>
        <p>${lesson.description}</p>
        <button onclick="showLesson('${lesson.title}')">عرض الدرس</button>
      `;
      lessonsContainer.appendChild(card);
    });

    // دالة لعرض محتوى الدرس داخل الصفحة
    function showLesson(title) {
      const lesson = siteData.lessons.find(l => l.title === title);
      document.getElementById('lessonContent').innerHTML = lesson.content;
    }

    // البريد الإلكتروني
    document.getElementById('email').textContent = siteData.contact.email;

    // جلب الأخبار من NewsAPI.org
    async function loadNews() {
      try {
        const apiKey = "5eaf21fc987746e0bcd619b8a7b9f230"; // ضع مفتاح NewsAPI هنا
        const url = `https://newsapi.org/v2/everything?q=technology&language=ar&apiKey=${apiKey}`;

        const response = await fetch(url);
        const data = await response.json();

        const newsContainer = document.getElementById('newsList');
        newsContainer.innerHTML = "";

        data.articles.forEach(article => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${article.title}</h3>
            <p>${article.description || "بدون وصف"}</p>
            <a href="${article.url}" target="_blank">اقرأ المزيد</a>
          `;
          newsContainer.appendChild(card);
        });
      } catch (error) {
        document.getElementById('newsList').textContent = "تعذر تحميل الأخبار.";
        console.error("خطأ في جلب الأخبار:", error);
      }
    }

    loadNews();

    // زر الوضع الليلي
    const darkModeBtn = document.getElementById('darkModeBtn');
    darkModeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      darkModeBtn.textContent = document.body.classList.contains('dark') 
        ? "تفعيل الوضع الفاتح" 
        : "تفعيل الوضع الليلي";
    });
  </script>
</body>
</html>
