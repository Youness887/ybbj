<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Morocco</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #fff; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); }
        .typing-indicator span { width: 4px; height: 4px; background: #6366f1; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-white/5 glass flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-violet-700 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="sparkles" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-xs font-black uppercase tracking-widest text-indigo-400">Nexus PRO</h1>
                <p id="status-text" class="text-[9px] text-slate-500 font-bold uppercase tracking-tight">جاهز للاستخدام في المغرب</p>
            </div>
        </div>
        <button onclick="toggleSettings()" class="p-2.5 bg-slate-800/50 rounded-xl border border-white/5 active:scale-95 transition-all">
            <i data-lucide="settings-2" class="w-5 h-5 text-slate-300"></i>
        </button>
    </header>

    <!-- Chat View -->
    <main id="chat-viewport" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32 no-scrollbar scroll-smooth"></main>

    <!-- Bottom Input -->
    <div class="fixed bottom-0 left-0 right-0 p-4 glass border-t border-white/5">
        <form onsubmit="handleChatSubmit(event)" class="max-w-3xl mx-auto flex items-center gap-3">
            <div class="relative flex-1">
                <input type="text" id="user-msg" placeholder="اسأل Nexus عن أي شيء..." 
                       class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-6 pr-12 text-sm outline-none focus:border-indigo-500 text-white transition-all placeholder:text-slate-600">
                <i data-lucide="zap" class="absolute left-4 top-4 w-5 h-5 text-slate-700"></i>
            </div>
            <button type="submit" class="p-4 bg-indigo-600 rounded-2xl text-white shadow-xl shadow-indigo-500/20 active:scale-90 transition-all group">
                <i data-lucide="send-horizonal" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-in zoom-in-95 duration-200">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-lg font-black text-white italic">إعدادات النظام</h2>
                <button onclick="toggleSettings()"><i data-lucide="x" class="w-6 h-6 text-slate-500"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="p-4 bg-indigo-600/5 rounded-2xl border border-indigo-500/10 text-center">
                    <p class="text-[10px] text-indigo-300 font-medium mb-3">تأكد من استخدام مفتاح صالح من Google AI Studio</p>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="inline-flex items-center gap-2 text-[10px] font-black text-indigo-500 uppercase tracking-widest hover:text-indigo-400">
                        استخراج المفتاح مجاناً <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest px-1">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="AIzaSy..." 
                           class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-xs text-white text-left outline-none focus:border-indigo-500 transition-all">
                </div>

                <button onclick="saveAndInitialize()" class="w-full bg-indigo-600 py-4 rounded-2xl text-xs font-black text-white uppercase tracking-widest shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 active:scale-95 transition-all">
                    تحديث الاتصال
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        lucide.createIcons();

        let currentKey = localStorage.getItem('nexus_morocco_v1') || '';
        
        function toggleSettings() {
            document.getElementById('settings-overlay').classList.toggle('hidden');
        }

        function saveAndInitialize() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) {
                currentKey = val;
                localStorage.setItem('nexus_morocco_v1', currentKey);
                toggleSettings();
                document.getElementById('status-text').innerText = "تم تحديث المفتاح بنجاح";
                document.getElementById('status-text').classList.replace('text-slate-500', 'text-green-500');
                addMessage('bot', '✅ النظام جاهز الآن. كيف يمكنني مساعدتك؟');
            }
        }

        async function handleChatSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('user-msg');
            const prompt = input.value.trim();
            
            if (!prompt) return;
            if (!currentKey) { toggleSettings(); return; }

            addMessage('user', prompt);
            input.value = '';
            const loadingId = addMessage('bot', '<div class="typing-indicator"><span></span><span></span><span></span></div>');

            try {
                // المحاولة عبر الرابط الرسمي الأكثر استقراراً للمغرب
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${currentKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (data.error) {
                    let errorMsg = `⚠️ عذراً، حدث خطأ: ${data.error.message}`;
                    if (data.error.status === "PERMISSION_DENIED") errorMsg = "❌ المفتاح غير صحيح أو غير مفعل. تأكد من نسخه من Google AI Studio.";
                    updateMessage(loadingId, errorMsg);
                } else {
                    const reply = data.candidates[0].content.parts[0].text;
                    updateMessage(loadingId, formatReply(reply));
                }
            } catch (err) {
                updateMessage(loadingId, "❌ فشل الاتصال بالخادم. تأكد من جودة الإنترنت في منطقتك.");
            }
        }

        function formatReply(text) {
            // معالجة بسيطة للنصوص والرموز
            return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }

        function addMessage(role, content) {
            const id = Date.now();
            const viewport = document.getElementById('chat-viewport');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-2`;
            
            const bubbleClass = role === 'user' 
                ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none' 
                : 'bg-slate-900 border border-white/5 text-slate-100 rounded-2xl rounded-tl-none';

            wrapper.innerHTML = `
                <div id="msg-${id}" class="max-w-[85%] px-5 py-3.5 shadow-2xl text-[13px] leading-relaxed animate-in fade-in slide-in-from-bottom-4 duration-300 ${bubbleClass}">
                    ${content}
                </div>
            `;
            
            viewport.appendChild(wrapper);
            viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateMessage(id, content) {
            const el = document.getElementById(`msg-${id}`);
            if (el) {
                el.innerHTML = content;
                const viewport = document.getElementById('chat-viewport');
                viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
