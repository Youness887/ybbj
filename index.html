<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Telegram Bot</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root {
            --tg-theme-bg-color: #020617;
            --tg-theme-text-color: #ffffff;
            --tg-theme-button-color: #4f46e5;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color);
            margin: 0; padding: 0; overflow: hidden;
        }
        .tg-button { background-color: var(--tg-theme-button-color); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                <i data-lucide="bot" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 id="user-name" class="text-[12px] font-black uppercase italic">Nexus AI</h1>
                <p class="text-[8px] text-slate-400">Telegram Edition v8.3</p>
            </div>
        </div>
        <button onclick="openSettings()" class="p-2 bg-slate-800 rounded-full active:scale-90 transition-all">
            <i data-lucide="settings-2" class="w-4 h-4 text-slate-300"></i>
        </button>
    </header>

    <!-- Chat Container -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24 no-scrollbar">
        <div id="messages" class="space-y-4">
            <div class="bg-indigo-600/10 border border-indigo-500/20 p-4 rounded-2xl text-[11px] leading-relaxed text-indigo-200">
                مرحباً بك في نظام Nexus عبر تيليجرام. يرجى إدخال مفتاح Gemini الخاص بك في الإعدادات للبدء.
            </div>
        </div>
    </main>

    <!-- Input Section -->
    <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-900/90 backdrop-blur-md border-t border-white/5">
        <form onsubmit="handleInput(event)" class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="اطلب 'تصميم عملة يونس'..." 
                   class="flex-1 bg-slate-800 border border-white/10 rounded-xl py-3 px-4 text-sm outline-none text-white focus:border-indigo-500">
            <button type="submit" class="tg-button p-3 rounded-xl text-white shadow-lg active:scale-95 transition-all">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black text-white italic">إعدادات الاتصال</h2>
                <button onclick="closeSettings()"><i data-lucide="x" class="w-6 h-6 text-slate-400"></i></button>
            </div>
            <div class="space-y-4">
                <label class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Google Gemini API Key</label>
                <input type="password" id="api-key" placeholder="AIzaSy..." 
                       class="w-full bg-black border border-white/10 rounded-xl py-4 px-6 text-xs outline-none text-white text-left">
                <button onclick="saveKey()" class="w-full tg-button py-4 rounded-xl text-xs font-black text-white uppercase tracking-widest shadow-lg shadow-indigo-600/20">حفظ وتنشيط</button>
                <p class="text-[9px] text-slate-500 text-center">يتم حفظ المفتاح محلياً في ذاكرة جهازك فقط.</p>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp Initialization
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name + " Nexus";
        }

        lucide.createIcons();
        let apiKey = localStorage.getItem('tg_gemini_key_v83') || '';

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        function saveKey() {
            const val = document.getElementById('api-key').value.trim();
            if (val) {
                apiKey = val;
                localStorage.setItem('tg_gemini_key_v83', apiKey);
                closeSettings();
                tg.HapticFeedback.notificationOccurred('success');
                appendMessage('bot', '✅ تم تحديث المفتاح وتنشيط النظام.');
            }
        }

        async function handleInput(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            if (!apiKey) { openSettings(); return; }

            appendMessage('user', text);
            input.value = '';
            tg.HapticFeedback.impactOccurred('medium');

            const loadingId = appendMessage('bot', 'جاري التواصل مع الخادم...');

            try {
                // استخدام الموديل المستقر gemini-1.5-flash-latest
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    updateMessage(loadingId, `❌ خطأ API: ${data.error.message}`);
                } else if (data.candidates && data.candidates[0].content) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    updateMessage(loadingId, aiText);
                } else {
                    updateMessage(loadingId, "⚠️ لم يتم استلام استجابة صالحة.");
                }
            } catch (err) {
                updateMessage(loadingId, "❌ فشل الاتصال. تأكد من جودة الإنترنت.");
            }
        }

        function appendMessage(role, content) {
            const id = Date.now();
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2`;
            div.innerHTML = `
                <div id="msg-${id}" class="max-w-[85%] p-3 rounded-2xl text-[12px] shadow-lg ${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-800 border border-white/5 text-white rounded-tl-none'}">
                    ${content}
                </div>
            `;
            messagesDiv.appendChild(div);
            const container = document.getElementById('chat-container');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateMessage(id, content) {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.innerHTML = content;
        }
    </script>
</body>
</html>
