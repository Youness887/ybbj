<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مونة البيت</title>
  <!-- إضافة Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light text-center p-4">
  <h1 class="text-success mb-4">📦 قائمة المونة</h1>

  <!-- إدخال عنصر جديد -->
  <div class="input-group mb-3 w-50 mx-auto">
    <input type="text" id="itemInput" class="form-control" placeholder="أضف عنصر جديد">
    <input type="number" id="qtyInput" class="form-control" placeholder="الكمية" min="1" value="1">
    <select id="categoryInput" class="form-select">
      <option value="مواد أساسية">مواد أساسية</option>
      <option value="خضر">خضر</option>
      <option value="لحوم">لحوم</option>
      <option value="مشروبات">مشروبات</option>
    </select>
    <button class="btn btn-success" onclick="addItem()">➕ إضافة</button>
  </div>

  <!-- القائمة -->
  <ul id="itemList" class="list-group w-50 mx-auto mb-3"></ul>

  <!-- أزرار التصدير والمشاركة -->
  <button class="btn btn-primary me-2" onclick="exportPDF()">📄 تصدير إلى PDF</button>
  <button class="btn btn-warning me-2" onclick="exportCSV()">📊 تصدير إلى Excel (CSV)</button>
  <button class="btn btn-info" onclick="shareEmail()">📧 مشاركة عبر البريد الإلكتروني</button>

  <script>
    // تحميل القائمة من التخزين المحلي
    function loadItems() {
      const saved = JSON.parse(localStorage.getItem("mounaList")) || [
        {name:"سكر", qty:1, category:"مواد أساسية"},
        {name:"زيت", qty:1, category:"مواد أساسية"},
        {name:"دقيق", qty:2, category:"مواد أساسية"},
        {name:"أرز", qty:1, category:"مواد أساسية"},
        {name:"شاي", qty:1, category:"مشروبات"},
        {name:"حليب", qty:2, category:"مشروبات"}
      ];
      const list = document.getElementById("itemList");
      list.innerHTML = "";
      saved.forEach(item => {
        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";
        li.innerHTML = `${item.name} - ${item.qty} (${item.category})
          <button class="btn btn-sm btn-danger" onclick="removeItem('${item.name}')">🗑 حذف</button>`;
        list.appendChild(li);
      });
    }

    // إضافة عنصر جديد
    function addItem() {
      const name = document.getElementById("itemInput").value.trim();
      const qty = parseInt(document.getElementById("qtyInput").value);
      const category = document.getElementById("categoryInput").value;
      if(name !== "" && qty > 0) {
        const saved = JSON.parse(localStorage.getItem("mounaList")) || [];
        saved.push({name, qty, category});
        localStorage.setItem("mounaList", JSON.stringify(saved));
        document.getElementById("itemInput").value = "";
        document.getElementById("qtyInput").value = 1;
        loadItems();
      }
    }

    // حذف عنصر
    function removeItem(name) {
      let saved = JSON.parse(localStorage.getItem("mounaList")) || [];
      saved = saved.filter(i => i.name !== name);
      localStorage.setItem("mounaList", JSON.stringify(saved));
      loadItems();
    }

    // تصدير إلى PDF
    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFont("helvetica", "bold");
      doc.text("📦 قائمة المونة", 10, 10);

      const saved = JSON.parse(localStorage.getItem("mounaList")) || [];
      let y = 20;
      saved.forEach(item => {
        doc.text(`${item.name} - ${item.qty} (${item.category})`, 10, y);
        y += 10;
      });

      doc.save("mouna-list.pdf");
    }

    // تصدير إلى CSV (Excel)
    function exportCSV() {
      const saved = JSON.parse(localStorage.getItem("mounaList")) || [];
      let csvContent = "اسم العنصر,الكمية,التصنيف\n";
      saved.forEach(item => {
        csvContent += `${item.name},${item.qty},${item.category}\n`;
      });

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "mouna-list.csv";
      link.click();
    }

    // مشاركة عبر البريد الإلكتروني
    function shareEmail() {
      const saved = JSON.parse(localStorage.getItem("mounaList")) || [];
      let emailBody = "📦 قائمة المونة:\n\n";
      saved.forEach(item => {
        emailBody += `${item.name} - ${item.qty} (${item.category})\n`;
      });

      const subject = "قائمة المونة";
      const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
      window.location.href = mailtoLink;
    }

    // تحميل القائمة عند فتح الصفحة
    window.onload = loadItems;
  </script>
</body>
</html>
