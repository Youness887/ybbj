<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>مدونة تقنية احترافية</title>

<style>

/* ===== تصميم عام ===== */

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
direction:rtl;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

/* ===== Header ===== */

header{
background:#1e1e2f;
color:white;
padding:20px;
text-align:center;
}

/* ===== Navigation ===== */

nav{
background:#333;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:15px;
cursor:pointer;
}

nav a:hover{
background:#555;
}

/* ===== Layout ===== */

.container{
display:flex;
flex-wrap:wrap;
width:95%;
margin:auto;
}

.posts{
flex:3;
padding:20px;
}

.post{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.dark .post{
background:#1e1e1e;
}

/* ===== Sidebar ===== */

.sidebar{
flex:1;
background:white;
padding:20px;
margin:20px;
border-radius:8px;
}

.dark .sidebar{
background:#1e1e1e;
}
<h3>أخبار الكريبتو</h3>
<div id="cryptoNews"></div>
/* ===== Admin Panel ===== */

.admin{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
display:none;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:8px 12px;
margin-top:10px;
border:none;
background:#007BFF;
color:white;
cursor:pointer;
}

/* ===== Footer ===== */

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

/* ===== Back to top ===== */

#topBtn{
position:fixed;
bottom:20px;
left:20px;
padding:10px;
background:#007BFF;
color:white;
border:none;
display:none;
}

/* ===== Responsive ===== */

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
margin:0 20px 20px 20px;
}

}

</style>
</head>
<meta name="description" content="مدونة تقنية عن الذكاء الاصطناعي والتكنولوجيا والبرمجة">

<meta name="keywords" content="AI, التكنولوجيا, البرمجة, الذكاء الاصطناعي, crypto">

<meta name="author" content="Youness">

<meta property="og:title" content="مدونة التكنولوجيا">

<meta property="og:description" content="أفضل المقالات عن التقنية والذكاء الاصطناعي">

<meta property="og:type" content="website">
<body>

<header>

<h1>مدونتي التقنية</h1>
<p>مقالات عن البرمجة والتكنولوجيا</p>

</header>

<nav>

<a onclick="home()">الرئيسية</a>
<a onclick="toggleDark()">الوضع الليلي</a>
<a onclick="login()">Admin</a>

</nav>

<div class="container">

<div class="posts" id="posts"></div>

<div class="sidebar">

<h3>بحث</h3>
<input id="search" placeholder="ابحث عن مقال">

<p>مدونة تجريبية مبنية بـ HTML و JavaScript.</p>

</div>

</div>

<div class="admin" id="admin">

<h3>إضافة مقال جديد</h3>

<input id="title" placeholder="عنوان المقال">

<textarea id="content" placeholder="المحتوى"></textarea>

<input id="image" placeholder="رابط الصورة">

<button onclick="addPost()">نشر</button>

</div>

<footer>

© 2026 جميع الحقوق محفوظة

</footer>

<button id="topBtn">⬆</button>

<script>
function generateSEO(title){

document.title = title;

let meta = document.querySelector("meta[name='description']");

meta.setAttribute(
"content",
title + " مقال تقني عن الذكاء الاصطناعي والتكنولوجيا"
);

}async function loadCryptoNews(){

let res = await fetch("https://cryptopanic.com/api/v1/posts/?auth_token=demo");

let data = await res.json();

let container = document.getElementById("cryptoNews");

data.results.slice(0,5).forEach(news=>{

container.innerHTML += `
<p>
<a href="${news.url}" target="_blank">
${news.title}
</a>
</p>
`;

});

}

loadCryptoNews();
/* ===== JSON للمقالات ===== */

let posts = JSON.parse(localStorage.getItem("posts")) || [

{
title:"تعلم HTML",
content:"HTML هي لغة بناء صفحات الويب.",
image:"https://picsum.photos/800/400?1",
date:"2026"
},

{
title:"تعلم CSS",
content:"CSS تستخدم لتنسيق وتصميم المواقع.",
image:"https://picsum.photos/800/400?2",
date:"2026"
}

];


/* ===== عرض المقالات ===== */

function render(list){

let container=document.getElementById("posts");

container.innerHTML="";

list.forEach((p,i)=>{

container.innerHTML+=`

<div class="post">

<h2>${p.title}</h2>

<img src="${p.image}" width="100%">

<p>${p.content}</p>

<small>${p.date}</small>

<div id="comments-${i}"></div>

<input id="c-${i}" placeholder="تعليق">

<button onclick="comment(${i})">إرسال</button>

<button onclick="deletePost(${i})">حذف</button>

</div>

`;

});

}


/* ===== إضافة مقال ===== */

function addPost(){

let title=document.getElementById("title").value;

let content=document.getElementById("content").value;

let image=document.getElementById("image").value;

posts.unshift({

title,
content,
image,
date:new Date().toLocaleDateString()

});

localStorage.setItem("posts",JSON.stringify(posts));

render(posts);

}


/* ===== حذف مقال ===== */

function deletePost(i){

posts.splice(i,1);

localStorage.setItem("posts",JSON.stringify(posts));

render(posts);

}


/* ===== تعليقات ===== */

function comment(i){

let input=document.getElementById("c-"+i);

let text=input.value;

if(text==="") return;

let box=document.getElementById("comments-"+i);

let div=document.createElement("div");

div.innerText=text;

box.appendChild(div);

input.value="";

}


/* ===== البحث ===== */

document.getElementById("search").addEventListener("input",function(){

let word=this.value.toLowerCase();

let filtered=posts.filter(p=>p.title.toLowerCase().includes(word));

render(filtered);

});


/* ===== تسجيل دخول Admin ===== */

function login(){

let pass=prompt("كلمة المرور");

if(pass==="1234"){

document.getElementById("admin").style.display="block";

}

}


/* ===== الوضع الليلي ===== */

function toggleDark(){

document.body.classList.toggle("dark");

}


/* ===== زر العودة للأعلى ===== */

let btn=document.getElementById("topBtn");

window.onscroll=function(){

if(document.documentElement.scrollTop>200){

btn.style.display="block";

}else{

btn.style.display="none";

}

};

btn.onclick=function(){

window.scrollTo({top:0,behavior:"smooth"});

};


render(posts);

</script>

</body>
</html>
