<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مونة البيت</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #f9f9f9; text-align: center; }
    h1 { color: #4CAF50; }
    input, button { padding: 10px; margin: 5px; }
    ul { list-style: none; padding: 0; }
    li { background: #fff; margin: 5px; padding: 10px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>📦 قائمة المونة</h1>
  <input type="text" id="itemInput" placeholder="أضف عنصر جديد">
  <button onclick="addItem()">➕ إضافة</button>
  <ul id="itemList"></ul>

  <script>
    // تحميل القائمة من التخزين المحلي
    function loadItems() {
      const saved = JSON.parse(localStorage.getItem("mounaList")) || ["سكر", "زيت", "دقيق", "أرز"];
      const list = document.getElementById("itemList");
      list.innerHTML = "";
      saved.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        li.onclick = () => removeItem(item);
        list.appendChild(li);
      });
    }

    // إضافة عنصر جديد
    function addItem() {
      const input = document.getElementById("itemInput");
      const item = input.value.trim();
      if(item !== "") {
        const saved = JSON.parse(localStorage.getItem("mounaList")) || [];
        saved.push(item);
        localStorage.setItem("mounaList", JSON.stringify(saved));
        input.value = "";
        loadItems();
      }
    }

    // حذف عنصر
    function removeItem(item) {
      let saved = JSON.parse(localStorage.getItem("mounaList")) || [];
      saved = saved.filter(i => i !== item);
      localStorage.setItem("mounaList", JSON.stringify(saved));
      loadItems();
    }

    // تحميل القائمة عند فتح الصفحة
    window.onload = loadItems;
  </script>
</body>
</html>
