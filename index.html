<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --tg-bg: #020617; --tg-btn: #4f46e5; }
        body { font-family: 'Cairo', sans-serif; background: var(--tg-bg); color: #fff; margin: 0; overflow: hidden; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900/80 backdrop-blur">
        <div class="flex items-center gap-2">
            <i data-lucide="brain-circuit" class="text-indigo-400 w-6 h-6"></i>
            <h1 class="text-sm font-bold uppercase tracking-wider">Nexus Engine</h1>
        </div>
        <button onclick="openSettings()" class="p-2 bg-slate-800 rounded-lg"><i data-lucide="key" class="w-4 h-4 text-slate-400"></i></button>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24"></main>

    <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-900/90 border-t border-white/5">
        <form onsubmit="handleSend(event)" class="flex gap-2 max-w-2xl mx-auto">
            <input type="text" id="input" placeholder="اكتب سؤالك هنا..." class="flex-1 bg-slate-800 border border-white/10 rounded-xl py-3 px-4 text-sm outline-none text-white focus:border-indigo-500">
            <button type="submit" class="bg-indigo-600 p-3 rounded-xl shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
        </form>
    </div>

    <!-- Settings Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-6">
            <div class="flex justify-between mb-6">
                <h2 class="text-sm font-bold">إعدادات المفتاح</h2>
                <button onclick="closeSettings()"><i data-lucide="x" class="w-5 h-5 text-slate-400"></i></button>
            </div>
            <div class="space-y-4">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block w-full text-center py-3 bg-indigo-600/20 border border-indigo-500/30 rounded-xl text-[10px] font-bold text-indigo-400 mb-4 hover:bg-indigo-600/30">
                    احصل على مفتاح مجاني من هنا (Google AI Studio)
                </a>
                <input type="password" id="api-key" placeholder="ألصق المفتاح هنا..." class="w-full bg-black border border-white/10 rounded-xl py-4 px-4 text-xs text-white text-left outline-none focus:border-indigo-500">
                <button onclick="save()" class="w-full bg-indigo-600 py-4 rounded-xl text-xs font-bold uppercase shadow-lg shadow-indigo-600/20">تنشيط النظام</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand(); lucide.createIcons();
        let key = localStorage.getItem('nexus_key') || '';
        
        function openSettings() { document.getElementById('modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('modal').classList.add('hidden'); }
        function save() { key = document.getElementById('api-key').value.trim(); localStorage.setItem('nexus_key', key); closeSettings(); }

        async function handleSend(e) {
            e.preventDefault(); const input = document.getElementById('input'); const text = input.value.trim();
            if (!text || !key) { if(!key) openSettings(); return; }
            append('user', text); input.value = '';
            const loadId = append('bot', 'جاري التفكير...');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await res.json();
                update(loadId, data.candidates[0].content.parts[0].text);
            } catch (err) { update(loadId, "❌ تأكد من صحة المفتاح والإنترنت."); }
        }

        function append(role, msg) {
            const id = Date.now(); const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div id="m-${id}" class="max-w-[85%] p-3 rounded-2xl text-[12px] ${role === 'user' ? 'bg-indigo-600' : 'bg-slate-800 border border-white/5'}">${msg}</div>`;
            chat.appendChild(div); chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }); return id;
        }
        function update(id, msg) { const el = document.getElementById(`m-${id}`); if(el) el.innerText = msg; }
    </script>
</body>
</html>
